server.port=8080

spring.threads.virtual.enabled=true

spring.ai.mcp.server.name=diffbot-mcp
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.instructions=DiffBot robot gateway. Prefer high-level robot tools and use diagnostics only as an explicit escape hatch.

spring.ai.mcp.client.initialized=false
spring.ai.mcp.client.streamable-http.connections.ros-mcp.url=http://localhost:9089
spring.ai.mcp.client.streamable-http.connections.ros-mcp.endpoint=/mcp

diffbot.rosbridge.ip=192.168.0.147
diffbot.rosbridge.port=9090
diffbot.rosbridge.connect-timeout-seconds=2.0

diffbot.audio.host=192.168.0.147
diffbot.audio.port=50052
diffbot.audio.deadline-seconds=60.0
