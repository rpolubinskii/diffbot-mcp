server.port=8080

spring.threads.virtual.enabled=true
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p --- [%15.15t] %-40.40logger{39} : %m %kvp%n%wEx

spring.ai.mcp.server.name=diffbot-mcp
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.instructions=DiffBot robot gateway. Prefer high-level robot tools and use diagnostics only as an explicit escape hatch.

spring.ai.mcp.client.initialized=false
spring.ai.mcp.client.streamable-http.connections.ros-mcp.url=http://localhost:9000
spring.ai.mcp.client.streamable-http.connections.ros-mcp.endpoint=/mcp
# diffbot-memory (Graphiti) on the 3090 host. If the streamable-http transport
# rejects the handshake, switch this to an sse connection.
spring.ai.mcp.client.streamable-http.connections.diffbot-memory.url=http://192.168.0.176:8100
spring.ai.mcp.client.streamable-http.connections.diffbot-memory.endpoint=/mcp

diffbot.rosbridge.ip=192.168.0.147
diffbot.rosbridge.port=9090
diffbot.rosbridge.connect-timeout-seconds=2.0

diffbot.debug.enabled=false
diffbot.audio.host=192.168.0.147
diffbot.audio.port=50052
diffbot.audio.deadline-seconds=60.0

# diffbot-semantic (semantic map) gRPC service on the 3090 host.
diffbot.semantic.host=192.168.0.176
diffbot.semantic.port=50053
diffbot.semantic.deadline-seconds=10.0
